<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Projects</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .subtitle {
      opacity: 0.8;
      margin-bottom: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      padding: 25px;
      border-radius: 16px;
      text-decoration: none;
      color: white;
      transition: all 0.25s ease;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .card:hover {
      transform: translateY(-6px) scale(1.02);
      background: rgba(59, 130, 246, 0.25);
      border-color: rgba(59, 130, 246, 0.6);
    }

    .school-name {
      font-size: 1.1rem;
      font-weight: 500;
    }

    footer {
      margin-top: 40px;
      font-size: 0.85rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎓 Student Projects</h1>
    <p class="subtitle">Explore websites developed by our talented students</p>

    <div class="grid">
      <a class="card" href="ManderaGirls/">
        <div class="school-name">Mandera Girls Secondary School</div>
      </a>

      <a class="card" href="MlandegeSec/">
        <div class="school-name">Mlandege Secondary School</div>
      </a>

      <a class="card" href="Moshisec/">
        <div class="school-name">Moshi Secondary School</div>
      </a>
    </div>

    <footer>
      © 2026 Student Projects Showcase
    </footer>
  </div>
</body>
</html>
